<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">H. Zhou GitHub profile banner</title>
  <desc id="desc">A dark quantitative finance themed banner with portfolio curves, code panels, and the text Quant Systems and Portfolio Intelligence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070b"/>
      <stop offset="0.48" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="150" y1="340" x2="1130" y2="80" gradientUnits="userSpaceOnUse">
