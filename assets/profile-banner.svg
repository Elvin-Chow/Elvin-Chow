      <stop offset="1" stop-color="#f78166"/>
    </linearGradient>
    <filter id="softGlow" x="-80" y="-80" width="1440" height="580" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.51 0 0 0 0 0.97 0 0 0 0.24 0"/>
      <feBlend mode="screen" in2="SourceGraphic"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="#30363d" stroke-width="1" opacity="0.32"/>
    </pattern>
